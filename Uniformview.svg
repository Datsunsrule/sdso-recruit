        fill="none" stroke="#F0AB00" stroke-width="11"/>

  <!-- Inner square with slightly rounded corners -->
  <rect x="208" y="46" width="84" height="84" rx="6" ry="6"
        fill="none" stroke="#F0AB00" stroke-width="11"/>

  <!-- Wordmark -->
  <text x="250" y="192"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="46"
        fill="#F0AB00"
        letter-spacing="1">
    <tspan font-weight="900" font-family="Arial Black, Arial, sans-serif">UNIFORM</tspan><tspan font-weight="300" font-family="Arial, sans-serif">VIEW</tspan><tspan font-size="18" baseline-shift="super" font-family="Arial, sans-serif" font-weight="400">TM</tspan>
  </text>

